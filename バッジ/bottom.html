<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>バッジシステム</title>
    <link rel="stylesheet" href="botttom.css">
</head>
<body>

    <h1 style="color: white; text-shadow: 0 2px 4px rgba(0,0,0,0.2);">バッジ一覧</h1>

<div class="badge-list">
    <div class="badge-item" data-name="感謝バッジ" data-description="アプリ入れてくれてありがとう！！">
        <img src="はじまり.png" class="badge-img">
    </div>
    <div class="badge-item" data-name="初ミッション達成" data-description="ゴミを持ち帰る">
        <img src="はじまり.png" class="badge-img">
    </div>
    <div class="badge-item" data-name="初ミッション達成" data-description="マイバックを使う">
        <img src="はじまり.png" class="badge-img">
    </div>
    <div class="badge-item" data-name="初ミッション達成" data-description="マイボトル持参">
        <img src="はじまり.png" class="badge-img">
    </div>
    <div class="badge-item" data-name="初ミッション達成" data-description="ラベル・キャップを剥がす">
        <img src="はじまり.png" class="badge-img">
    </div>
    <div class="badge-item" data-name="プラスチック" data-description="マイバックを使う">
        <img src="はじまり.png" class="badge-img">
    </div>
    <div class="badge-item" data-name="可燃ごみ" data-description="マイボトル持参">
        <img src="はじまり.png" class="badge-img">
    </div>
    <div class="badge-item" data-name="不燃ごみ" data-description="分別5回">
        <img src="はじまり.png" class="badge-img">
    </div>
    <div class="badge-item" data-name="ペットボトル" data-description="分別5回">
        <img src="はじまり.png" class="badge-img">
    </div>
    <div class="badge-item" data-name="びん" data-description="分別5回">
        <img src="はじまり.png" class="badge-img">
    </div>
    <div class="badge-item" data-name="かん" data-description="分別5回">
        <img src="はじまり.png" class="badge-img">
    </div>
    <div class="badge-item" data-name="金属製ごみ" data-description="分別5回">
        <img src="はじまり.png" class="badge-img">
    </div>
    <div class="badge-item" data-name="紙類" data-description="分別5回">
        <img src="はじまり.png" class="badge-img">
    </div>
    <div class="badge-item" data-name="未達成" data-description="まだ達成できていません">
        <img src="未達成.png" class="badge-img">
    </div>
    <div class="badge-item" data-name="未達成" data-description="まだ達成できていません">
        <img src="未達成.png" class="badge-img">
    </div>
    <div class="badge-item" data-name="未達成" data-description="まだ達成できていません">
        <img src="未達成.png" class="badge-img">
    </div>
</div>

<!-- バッジ詳細モーダル -->
<div id="badge-modal" class="modal">
    <div class="modal-content">
        <span class="close-btn">&times;</span>
        <h2 id="modal-title"></h2>
        <p id="modal-description"></p>
    </div>
</div>
    <script src="bottom.js"></script>
</body>
</html>
